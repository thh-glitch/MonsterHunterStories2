      --border-color: #333;

      --power-color: #ff5252;

      --tech-color: #69f0ae;

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

      color: var(--text-main);
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    #searchInput {
      width: 100%;
      max-width: 500px;
      padding: 12px 20px;
      font-size: 16px;
      border: 1px solid var(--border-color);
      border-radius: 25px;
      background-color: var(--panel-bg);
      color: var(--text-main);
      outline: none;
      transition: border-color 0.3s;
    }

    #searchInput:focus {
      border-color: var(--primary-color);
    }

    .table-container {
      overflow-x: auto;
      background-color: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #2a2a2a;
      color: var(--primary-color);
      font-weight: 600;
      white-space: nowrap;
    }

    tr:hover {
      background-color: #252525;
    }

    .tendency-力 { color: var(--power-color); font-weight: bold; }
    .tendency-速 { color: var(--speed-color); font-weight: bold; }
    .tendency-技 { color: var(--tech-color); font-weight: bold; }
    
    .attack-pattern {
      font-size: 0.95em;
    }
    
    .note {
      color: var(--text-muted);
      font-size: 0.85em;
    }

  </style>

    // 格式化攻擊順序的文字，讓 力/速/技 產生顏色，並處理[註:]
    function formatPattern(text) {
      let html = text.replace(/(力|速|技)/g, match => `<span class="tendency-${match}">${match}</span>`);
      html = html.replace(/\[註:(.*?)\]/g, '<br><span class="note">($1)</span>');
      return `<div class="attack-pattern">${html}</div>`;
    }

    // 渲染表格內容
    function renderTable(data) {
      tableBody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        
        // 魔物名稱
        let tdName = document.createElement('td');
        tdName.textContent = row[0];
        tr.appendChild(tdName);

        // 出招順序
        let tdPattern = document.createElement('td');
        tdPattern.innerHTML = formatPattern(row[1]);
        tr.appendChild(tdPattern);

        // 基本肉質
        let tdBase = document.createElement('td');
        tdBase.innerHTML = `<span class="tendency-${row[2]}">${row[2]}</span>`;
        tr.appendChild(tdBase);

        // 專屬基因
        let tdGene = document.createElement('td');
        tdGene.textContent = row[3];
        tr.appendChild(tdGene);

        // 棲息地
        let tdLoc = document.createElement('td');
        tdLoc.textContent = row[4];
        tr.appendChild(tdLoc);

        // 駕馭動作
        let tdAction = document.createElement('td');
        tdAction.textContent = row[5];
        tr.appendChild(tdAction);

        tableBody.appendChild(tr);
      });
    }

    // 初次載入渲染全部資料
    renderTable(rawData);

    // 搜尋過濾功能
    searchInput.addEventListener('input', function(e) {

      const filteredData = rawData.filter(row => {
        return row.some(cell => cell.toLowerCase().includes(keyword));
      });
      renderTable(filteredData);
    });
