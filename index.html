    .monster-list { padding: 0 14px; }

    .monster-name { font-size: 18px; font-weight: bold; color: #ffffff; }

    .badge-power { background-color: #c62828; border: 1px solid #ff5252; }
    .badge-speed { background-color: #1565c0; border: 1px solid #448aff; }
    .badge-tech { background-color: #2e7d32; border: 1px solid #69f0ae; }
    .badge-none { background-color: #424242; color: #bbb; font-weight: normal; }
    
    .pin-btn { position: absolute; right: 10px; top: 12px; background: none; border: none; font-size: 22px; color: #444; cursor: pointer; padding: 2px; line-height: 1; }
    .pin-btn.pinned { color: #ffd700; }
    
    .pattern-row { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 8px; }

      ["金火龍", "速", "憤怒:力/白炎:技", "速", "火屬性速基因(特大)：女王猛毒 / 炫目烈焰"], ["銀火龍", "技", "憤怒:速/白炎:力", "技", "火屬性技基因(特大)：王者審判 / 閃焰烈風"], ["黑龍", "力", "憤怒:速/超怒:技", "不可", "-共鬥終局最終挑戰 Boss，不可成為隨行獸-"], ["絢輝龍", "速", "殼怒:力/解技/解怒:速", "不可", "-共鬥專用大型副本 Boss，不可成為隨行獸-"], ["燼滅刃斬龍", "力", "蓄熱:速/憤怒:技", "力", "火屬性力基因(特大)：燼滅刃爆燃斬 / 尾部蓄熱"], ["青電主電龍", "技", "電荷:力/空中:速", "技", "雷屬性技基因(特大)：青電主電漿劈扣 / 電荷雷暴"], ["天眼泡狐龍", "技", "妖泡:速/開眼:力", "技", "水屬性技基因(特大)：天眼妖之舞 / 狐火泡纏"], ["銀嶺巨獸", "力", "鼻纏:技/憤怒:速", "力", "冰屬性力基因(特大)：銀嶺銀世界 / 百萬噸壓殺"], ["大轟龍", "速", "憤怒:力/爆氣:技", "速", "無屬性速基因(特大)：大轟爆裂狂吼"], ["黑炎王火龍", "力", "飛行:速/空怒:技", "力", "火屬性力基因(特大)：黑炎王超級爆炎 / 日輪高空"], ["麒麟亞種", "速", "憤怒:技", "速", "冰屬性速基因(特大)：冰靈大蛇落冰 / 冰霧寒流"], ["牙獵犬", "速", "憤怒:力", "速", "各屬性速基因(大)：牙獵犬屬性強襲 (隨屬性改變)"]
    ];

    const monsterData = rawData.map((item, index) => {
      return {
        id: "m_" + index,
        name: item[0],
        enemyNormal: item[1],
        enemySpecial: item[2],
        ownType: item[3],
        geneInfo: item[4],
        isUpdate: index >= 122
      };
    });

    let favorites = JSON.parse(localStorage.getItem('mhst2_favs_v3')) || [];
    let searchKeyword = '';
    let activeEnemyType = '';
    let activeOwnType = '';

    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearch');
    const enemyFilters = document.getElementById('enemyFilters');
    const ownFilters = document.getElementById('ownFilters');
    const mainListDiv = document.getElementById('mainList');
    const favListDiv = document.getElementById('favList');
    const favTitle = document.getElementById('favTitle');
    const mainTitle = document.getElementById('mainTitle');

    function render() {
      const filtered = monsterData.filter(m => {
        const matchesSearch = m.name.includes(searchKeyword) || m.geneInfo.includes(searchKeyword);
        const allEnemyPatterns = m.enemyNormal + m.enemySpecial;
        const matchesEnemy = activeEnemyType ? allEnemyPatterns.includes(activeEnemyType) : true;
        const matchesOwn = activeOwnType ? m.ownType === activeOwnType : true;
        return matchesSearch && matchesEnemy && matchesOwn;
      });

      mainTitle.innerText = `全魔物究極圖鑑 (已篩選出 ${filtered.length} 隻)`;

      const favMonsters = filtered.filter(m => favorites.includes(m.id));
      const normalMonsters = filtered.filter(m => !favorites.includes(m.id));

      if (favMonsters.length > 0) {
        favTitle.style.display = 'flex';
        favListDiv.innerHTML = favMonsters.map(m => generateCardHtml(m, true)).join('');
      } else {
        favTitle.style.display = 'none';
        favListDiv.innerHTML = '';
      }

      if (normalMonsters.length > 0) {
        mainListDiv.innerHTML = normalMonsters.map(m => generateCardHtml(m, false)).join('');
      } else if (favMonsters.length === 0) {
        mainListDiv.innerHTML = '<div class="empty-prompt">查無此魔物或基因，請更換關鍵字。</div>';
      } else {
        mainListDiv.innerHTML = '';
      }
    }

    function generateCardHtml(m, isPinned) {
      const getPatternClass = (p) => {
        if (p.includes('力')) return 'pattern-power';
        if (p.includes('速')) return 'pattern-speed';
        if (p.includes('技')) return 'pattern-tech';
        return '';
      };

      let ownBadgeHtml = '';
      if (m.ownType === '力') ownBadgeHtml = '<span class="own-badge badge-power">包包：🔴 力型</span>';
      else if (m.ownType === '速') ownBadgeHtml = '<span class="own-badge badge-speed">包包：🔵 速型</span>';
      else if (m.ownType === '技') ownBadgeHtml = '<span class="own-badge badge-tech">包包：🟢 技型</span>';
      else ownBadgeHtml = '<span class="own-badge badge-none">無法收服</span>';

      let enemyHtml = `<span class="pattern-box ${getPatternClass(m.enemyNormal)}">通常: ${m.enemyNormal}</span>`;
      if (m.enemySpecial) {
        const parts = m.enemySpecial.split('/');
        parts.forEach(part => {
          enemyHtml += ` <span class="pattern-box ${getPatternClass(part)}">${part}</span>`;
        });
      }

      return `
        <div class="monster-card">
          <div class="card-header">
            <div class="name-block">
              <span class="monster-name">${m.name}</span>
              ${m.isUpdate ? '<span class="update-badge">DLC 更新</span>' : ''}
              ${ownBadgeHtml}
            </div>
            <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${m.id}')">★</button>
          </div>
          <div class="pattern-row">
            ${enemyHtml}
          </div>
          <div class="gene-row">
            <div class="gene-title">🧬 核心基因 / 終局特大招式：</div>
            <div class="gene-content">${m.geneInfo}</div>
          </div>
        </div>
      `;
    }

    window.togglePin = function(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('mhst2_favs_v3', JSON.stringify(favorites));
      render();
    };

    searchInput.addEventListener('input', (e) => {
      searchKeyword = e.target.value.trim();
      render();
    });

    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      searchKeyword = '';
      render();
    });

    enemyFilters.addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-tag')) {
        const val = e.target.getAttribute('data-val');
        if (activeEnemyType === val) {
          activeEnemyType = '';
          e.target.classList.remove('active');
        } else {
          Array.from(enemyFilters.children).forEach(el => el.classList.remove('active'));
          activeEnemyType = val;
          e.target.classList.add('active');
        }
        render();
      }
    });

    ownFilters.addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-tag')) {
        const val = e.target.getAttribute('data-val');
        if (activeOwnType === val) {
          activeOwnType = '';
          e.target.classList.remove('active');
        } else {
          Array.from(ownFilters.children).forEach(el => el.classList.remove('active'));
          activeOwnType = val;
          e.target.classList.add('active');
        }
        render();
      }
    });

    render();
  </script>
</body>
